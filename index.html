<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campanhas para Clientes Qive SMB</title>
<script src="auth.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap');

  :root {
    --orange: #E95A1C;
    --orange-light: #FFF0E8;
    --orange-mid: #F97C45;
    --dark: #1A1A1A;
    --dark-2: #2E2E2E;
    --mid: #6B6B6B;
    --light: #F5F4F0;
    --border: #E5E3DC;
    --white: #FFFFFF;
    --green: #1D7A4B;
    --green-light: #E6F5EE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--light);
    color: var(--dark);
    font-size: 15px;
    line-height: 1.65;
  }

  /* HERO */
  .hero {
    background: var(--dark);
    color: var(--white);
    padding: 56px 48px 48px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: var(--orange);
    opacity: 0.12;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 20%;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--orange-mid);
    opacity: 0.08;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    line-height: 1.15;
    max-width: 680px;
    margin-bottom: 12px;
    position: relative;
  }
  .hero-sub {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    max-width: 560px;
    position: relative;
  }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 32px; }
  .section { padding: 48px 0; }
  .section + .section { border-top: 1px solid var(--border); }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .section-label .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--orange);
    flex-shrink: 0;
  }
  .section-label h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
  }

  /* GRID DE CAMPANHAS - 4 colunas */
  .campaign-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  @media (max-width: 980px) {
    .campaign-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    .campaign-grid { grid-template-columns: 1fr; }
  }

  .campaign-card {
    display: block;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 20px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .campaign-card:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
  }
  .campaign-card h3 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 18px;
    line-height: 1.25;
    color: var(--dark);
    margin-bottom: 12px;
  }
  .campaign-card p {
    font-size: 12.5px;
    color: var(--mid);
    margin-bottom: 4px;
  }
  .campaign-card p:last-child { margin-bottom: 0; }
  .campaign-card .field-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--mid);
    opacity: 0.7;
    margin-bottom: 2px;
  }
  .campaign-card .field-label:not(:first-of-type) { margin-top: 10px; }

  .empty-state {
    grid-column: 1 / -1;
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    color: var(--mid);
    font-size: 13px;
  }

  footer {
    text-align: center;
    padding: 28px 32px;
    font-size: 12px;
    color: var(--mid);
    border-top: 1px solid var(--border);
  }
  footer span { color: var(--orange); font-weight: 600; }
</style>
</head>
<body>

<div class="hero">
    <h1>Campanhas de Clientes SMB</h1>
    <p class="hero-sub">Confira todas as campanhas para clientes da Qive da BU de SMB.</p>
  </div>

  <div class="container">

    <!-- EXPANSÃO -->
    <div class="section">
      <div class="section-label"><div class="dot"></div><h2>Campanhas de Expansão</h2></div>
      <div class="campaign-grid" id="grid-expansao"></div>
    </div>

    <!-- RETENÇÃO -->
    <div class="section">
      <div class="section-label"><div class="dot"></div><h2>Campanhas de Retenção</h2></div>
      <div class="campaign-grid" id="grid-retencao"></div>
    </div>

  </div>

<footer>
  Time de Growth Marketing · <span>Qive</span> · Campanhas para Clientes SMB
</footer>

<script>
  /* ==========================================================
     CARREGAMENTO AUTOMÁTICO DAS CAMPANHAS
     ----------------------------------------------------------
     Os cards são montados a partir do campaigns.json, gerado
     automaticamente pelo GitHub Action toda vez que uma pasta
     de campanha (com campanha.json) é adicionada/alterada na
     raiz do repositório. Não é necessário editar este arquivo
     para adicionar novas campanhas — veja o campaign-template/
     na raiz do repo.
  ========================================================== */

  function renderCampaigns(list, containerId, emptyMsg) {
    const container = document.getElementById(containerId);
    if (!list.length) {
      container.innerHTML = '<div class="empty-state">' + emptyMsg + '</div>';
      return;
    }
    container.innerHTML = list.map(function(c) {
      return '<a class="campaign-card" href="' + c.link + '">' +
        '<h3>' + c.nome + '</h3>' +
        '<div class="field-label">Período</div>' +
        '<p>' + c.periodo + '</p>' +
        '<div class="field-label">Público / Segmentação</div>' +
        '<p>' + c.publico + '</p>' +
        '</a>';
    }).join('');
  }

  function renderError(msg) {
    ['grid-expansao', 'grid-retencao'].forEach(function(id) {
      document.getElementById(id).innerHTML = '<div class="empty-state">' + msg + '</div>';
    });
  }

  fetch('campaigns.json', { cache: 'no-store' })
    .then(function(res) {
      if (!res.ok) throw new Error('Falha ao carregar campaigns.json');
      return res.json();
    })
    .then(function(campaigns) {
      const expansao = campaigns.filter(function(c) { return c.categoria === 'expansao'; });
      const retencao = campaigns.filter(function(c) { return c.categoria === 'retencao'; });
      renderCampaigns(expansao, 'grid-expansao', 'Nenhuma campanha de expansão cadastrada ainda.');
      renderCampaigns(retencao, 'grid-retencao', 'Nenhuma campanha de retenção cadastrada ainda.');
    })
    .catch(function() {
      renderError('Não foi possível carregar as campanhas. Verifique se o campaigns.json existe na raiz do repositório.');
    });
</script>

</body>
</html>
